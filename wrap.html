<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .container {
        background-color: rgb(185, 216, 159);
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .a {
        background-color: rgb(232, 150, 42);
        width: 50px;
        order: 4;
      }

      .b {
        background-color: rgb(16, 218, 201);
        width: 50px;
      }
      .c {
        background-color: rgb(62, 10, 172);
        width: 50px;
      }
      .d {
        background-color: rgb(98, 60, 159);
        width: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="a">1</div>
      <div class="b">2</div>
      <div class="c">3</div>
      <div class="d">4</div>
    </div>
  </body>
</html>
